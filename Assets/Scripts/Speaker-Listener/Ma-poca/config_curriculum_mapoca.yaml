# MA-POCA curriculum config — parallel to config_curriculum.yaml.
# Use BehaviorParameters.BehaviorName = "SpeakerMaPoca" / "ListenerMaPoca" on the
# new prefabs that hold SpeakerAgentMaPoca / ListenerAgentMaPoca.
behaviors:
  SpeakerMaPoca:
    trainer_type: poca
    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 2.0e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        # Speaker acts once per episode. With POCA's centralized critic the
        # team return at t=N still propagates back to t=0 through the value
        # function, so gamma can stay at 0.0 without losing the credit signal.
        gamma: 0.0
        strength: 1.0

    max_steps: 12000000
    time_horizon: 1
    summary_freq: 5000
    keep_checkpoints: 5

  ListenerMaPoca:
    trainer_type: poca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 12000000
    time_horizon: 128
    summary_freq: 10000
    keep_checkpoints: 5

environment_parameters:
  # Three parameters share identical completion_criteria so they advance in
  # lockstep through the same 4-lesson schedule. Each lesson grows the referent
  # pool (num_colors * num_shapes) and the on-screen distractor count.
  #
  #   L0: 2 colors x 1 shape -> 2 referents, 2 buttons (break symmetry)
  #   L1: 3 colors x 1 shape -> 3 referents, 3 buttons (color protocol)
  #   L2: 3 colors x 2 shapes -> 6 referents, 3 buttons (introduce shape axis)
  #   L3: 3 colors x 3 shapes -> 9 referents, 3 buttons (full task)
  num_colors:
    curriculum:
      - name: L0_2c1s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 2.0
      - name: L1_3c1s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 3.0
      - name: L2_3c2s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 3.0
      - name: L3_3c3s
        value: 3.0

  num_shapes:
    curriculum:
      - name: L0_2c1s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 1.0
      - name: L1_3c1s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 1.0
      - name: L2_3c2s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 2.0
      - name: L3_3c3s
        value: 3.0

  active_buttons:
    curriculum:
      - name: L0_2c1s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 2.0
      - name: L1_3c1s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 3.0
      - name: L2_3c2s
        completion_criteria:
          measure: reward
          behavior: ListenerMaPoca
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.5
        value: 3.0
      - name: L3_3c3s
        value: 3.0
